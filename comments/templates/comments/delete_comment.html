{% extends "base.html" %}
{% load static %}

{% block title %}Delete Comment | Atelier Zero One{% endblock %}

{% block content %}
<div class="container mt-4">
    <h1>Delete Comment</h1>
    <p>Are you sure you want to delete this comment?</p>
    <blockquote>{{ comment.body }}</blockquote>
    <form method="POST">
        {% csrf_token %}
        <button type="submit" class="btn-dark-custom">Yes, Delete</button>
        <a href="{% url 'articles:article_detail' comment.article.slug %}" class="btn-outline-dark-custom">Cancel</a>
    </form>
</div>
{% endblock %}
