{% extends "base.html" %}
{% load static %}

{% block title %}Register | Atelier Zero One{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <h1>Create Account</h1>
            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit class=btn-dark-custom">Register</button>
            </form>
            <p class="mt-3">Already have an account?
                <a href="{% url 'account_login' %}">Log In</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
