{% extends "base.html" %}
{% load static %}

{% block title %}Log In | Atelier Zero One{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <h1>Log In</h1>
            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn-dark-custom">Log In</button>
            </form>
            <p class="mt-3">Don't have an account?
                <a href="{% url 'account_signup' %}">Register</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
