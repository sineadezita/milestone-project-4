{% extends "base.html" %}
{% load static %}

{% block title %}Log Out | Atelier Zero One{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <h1>Log Out</h1>
            <p>Are you sure you want to log out?</p>
            <form method="POST">
                {% csrf_token %}
                <button type="submit" class="btn-dark-custom">Log Out</button>
                <a href="{% url 'home' %}" class="btn-outline-dark-custom">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
