{% extends "base.html" %}
{% load static %}

{% block title %}My Profile | Atelier Zero One{% endblock %}

{% block content %}
<div class="container mt-4">
    <h1>My Reading List</h1>
    {% for article in saved_articles %}
    <div>
        <h2>{{ article.title }}</h2>
        <a href="{% url 'articles:article_detail' article.slug %}">Read</a>
    </div>
{% empty %}
    <p>No saved articles yet.</p>
{% endfor %}
</div>
{% endblock %}
